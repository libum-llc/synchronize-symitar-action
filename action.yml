name: 'Synchronize Symitar'
description: 'GitHub Action to synchronize a directory on the Jack Henry™ credit union core platform'
author: 'libum-llc'

branding:
  icon: 'refresh-cw'
  color: 'blue'

inputs:
  directory-type:
    description: 'The type of Symitar directory to synchronize (powerOns, letterFiles, dataFiles, helpFiles)'
    required: true
  local-directory-path:
    description: 'The local directory path containing files to synchronize. If not specified, defaults to the standard path for the selected directory type (e.g., REPWRITERSPECS/ for PowerOns)'
    required: false
  connection-type:
    description: 'The connection method to use (https or ssh). HTTPS is faster.'
    required: false
    default: 'ssh'
  sync-mode:
    description: 'Synchronization mode: push (upload only), pull (download only), or mirror (exact sync - deletes extra files on Symitar)'
    required: true
  dry-run:
    description: 'If true, shows proposed changes without applying them'
    required: false
    default: 'true'
  symitar-hostname:
    description: 'The Symitar server hostname or IP address'
    required: true
  symitar-app-port:
    description: 'The SymAppServer port (typically 42 + symNumber, e.g., 42627). Required when connection-type is https.'
    required: false
  ssh-username:
    description: 'The AIX SSH username for the Symitar host'
    required: true
  ssh-password:
    description: 'The AIX SSH password for the Symitar host'
    required: true
  ssh-port:
    description: 'The SSH port for the Symitar server (only used when connection-type is ssh)'
    required: false
    default: '22'
  sym-number:
    description: 'The Symitar SYM number (e.g., 627)'
    required: true
  symitar-user-number:
    description: 'The Symitar Quest user number'
    required: true
  symitar-user-password:
    description: 'The Symitar Quest user password'
    required: true
  api-key:
    description: 'The PowerOn Pipelines API Key from the Libum Portal'
    required: true
  install-poweron-list:
    description: 'Comma-delimited list of PowerOn files to install after sync (only applies to powerOns directory type)'
    required: false
    default: ''
  validate-ignore-list:
    description: 'Comma-delimited list of PowerOn files to skip validation for'
    required: false
    default: ''
  preserve-server-files:
    description: 'Comma-delimited list of exact filenames or glob patterns where the server copy should be preserved during push/mirror. Use with pull-preserved-only to pull only these files.'
    required: false
    default: ''
  pull-preserved-only:
    description: 'When sync-mode is pull, only pull files matched by preserve-server-files. If no preserve-server-files are configured, this is a no-op.'
    required: false
    default: 'false'
  commit-pulled-changes:
    description: 'When sync-mode is pull, commit and push pulled workspace changes after synchronization. Never commits during dry-run.'
    required: false
    default: 'false'
  commit-message:
    description: 'Commit message used when commit-pulled-changes is enabled'
    required: false
    default: 'chore: sync server-managed Symitar files [skip ci]'
  commit-branch:
    description: 'Branch to push the commit to. Defaults to the checked-out branch.'
    required: false
    default: ''
  git-user-name:
    description: 'Git author name used when commit-pulled-changes is enabled'
    required: false
    default: 'libum-bot'
  git-user-email:
    description: 'Git author email used when commit-pulled-changes is enabled'
    required: false
    default: 'bot@libum.io'
  sync-method:
    description: 'The transport method for file synchronization: sftp (default) or rsync'
    required: false
    default: 'sftp'
  sftp-concurrency:
    description: 'Number of concurrent SFTP transfers (only applies when sync-method is sftp)'
    required: false
    default: '4'
  debug:
    description: 'Enable debug logging'
    required: false
    default: 'false'

outputs:
  files-deployed:
    description: 'Number of files deployed (added/updated)'
  files-deleted:
    description: 'Number of files deleted'
  files-installed:
    description: 'Number of PowerOn files installed (only for powerOns directory type)'
  files-uninstalled:
    description: 'Number of PowerOn files uninstalled (only for powerOns directory type)'

runs:
  using: 'node20'
  main: 'dist/index.js'
